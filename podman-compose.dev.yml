version:
  "3.9"

  # -----------------------------
  # BACKEND — hot reload via Air
  # -----------------------------
services:
  backend:
    build:
      context: ./backend
      dockerfile: deploy/backend.dev.Dockerfile
    user: "${UID}:${GID}"
    volumes:
      - ./backend:/app:Z
    working_dir: /app
    command: air
    ports:
      - "8080:8080"

  # -----------------------------
  # FRONTEND — React dev server
  # -----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
